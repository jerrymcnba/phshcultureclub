<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>词语卡-体育馆</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f5f5f5;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .card{
      background:white;
      padding:30px;
      border-radius:20px;
      width:90%;
      max-width:320px;
      text-align:center;
      box-shadow:0 4px 20px rgba(0,0,0,0.1);
    }

    h1{
      margin-bottom:10px;
    }

    p{
      color:#666;
      margin-bottom:20px;
    }

    img{
      width:100%;
      border-radius:15px;
      margin-bottom:20px;
    }

    audio{
      width:100%;
    }

    .footer{
      margin-top:20px;
      font-size:18px;
      color:#999;
    }
  </style>
</head>

<body>
  <div class="card">
    <img src="gym.png" alt="poster">

    <p>词语</p>
    <audio controls>
      <source src="gym.m4a" type="audio/mp4">
    </audio>

    <p>例句</p>
    <audio controls>
      <source src="gym-example.m4a" type="audio/mp4">
    </audio>

    <div class="footer">
      网站更多内容筹备中，敬请期待 ✨
    </div>
  </div>
</body>
</html>
