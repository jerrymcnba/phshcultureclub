<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XXX 社团音频</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f5f5f5;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .card{
      background:white;
      padding:30px;
      border-radius:20px;
      width:90%;
      max-width:320px;
      text-align:center;
      box-shadow:0 4px 20px rgba(0,0,0,0.1);
    }

    h1{
      margin-bottom:10px;
    }

    p{
      color:#666;
      margin-bottom:20px;
    }

    audio{
      width:100%;
    }

    .footer{
      margin-top:20px;
      font-size:14px;
      color:#999;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>XXX 社团</h1>
    <p>欢迎收听活动音频</p>

    <audio controls>
      <source src="体育馆.mp3" type="audio/mpeg">
      你的浏览器不支持音频播放
    </audio>

    <div class="footer">
      Website coming soon ✨
    </div>
  </div>
</body>
</html>
